workflows:
  ios-workflow:
    name: iOS Build con Firma
    environment:
      flutter: stable
      xcode: latest
    integrations:
      app_store_connect: "Codemagic"  # Conecta con tu Apple Developer
    scripts:
      - name: Obtener dependencias
        script: flutter pub get
      
      - name: Instalar pods
        script: cd ios && pod install
      
      - name: Configurar llavero
        script: keychain initialize
      
      - name: Obtener certificados de Apple
        script: |
          app-store-connect fetch-signing-files "$(xcode-project detect-bundle-id)" \
            --type IOS_APP_DEVELOPMENT \
            --create
      
      - name: Añadir certificados al llavero
        script: keychain add-certificates
      
      - name: Configurar firma en proyecto
        script: xcode-project use-profiles
      
      - name: Construir IPA firmado
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/tmp/exportOptions.plist
      
    artifacts:
      - build/ios/ipa/*.ipa
