workflows:
  ios-no-codesign:
    name: iOS No Codesign
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios && pod install

      - name: Build iOS no codesign
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r StudySync.ipa Payload/

    artifacts:
      - build/ios/iphoneos/StudySync.ipa