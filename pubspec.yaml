name: studymatch
description: StudyMatch - Conecta con compañeros de estudio

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3+1
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.2.0
  
  # Navigation
  go_router: ^17.2.3
  
  # Google Sign In
  google_sign_in: ^7.2.0
  
  # WebSocket
  web_socket_channel: ^3.0.3
  
  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.1.0
  
  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
